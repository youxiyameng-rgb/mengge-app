name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Convert PKCS12 to JKS
      run: |
        keytool -importkeystore \
          -srckeystore app/release-key.p12 \
          -srcstoretype PKCS12 \
          -srcstorepass mengge123 \
          -srcalias mengge \
          -destkeystore app/release-key.jks \
          -deststoretype JKS \
          -deststorepass mengge123 \
          -destalias mengge \
          -noprompt

    - name: Build Release APK
      run: ./gradlew assembleRelease

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
