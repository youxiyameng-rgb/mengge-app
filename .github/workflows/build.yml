name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Generate keystore
      run: |
        keytool -genkeypair -v \
          -keystore app/release-key.jks \
          -storetype JKS \
          -keyalg RSA -keysize 2048 -validity 36500 \
          -alias mengge \
          -storepass mengge123 \
          -keypass mengge123 \
          -dname "CN=MengGe AI Voice, OU=Development, O=OmniMind, L=Shanghai, C=CN"

    - name: Verify keystore
      run: ls -la app/release-key.jks && keytool -list -keystore app/release-key.jks -storepass mengge123

    - name: Build Release APK
      run: ./gradlew assembleRelease --info 2>&1 | tail -50

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: app-release
        path: app/build/outputs/apk/release/*.apk
        retention-days: 30
